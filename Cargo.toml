[package]
name = "sasurahime"
version = "0.1.2"
edition = "2021"
license = "MIT"

[[bin]]
name = "sasurahime"
path = "src/main.rs"

[dependencies]
clap        = { version = "4", features = ["derive"] }
anyhow      = "1"
walkdir     = "2"
indicatif   = "0.17"
dialoguer   = "0.11"
comfy-table = "7"
dirs        = "5"
toml        = "0.8"
serde       = { version = "1", features = ["derive"] }

[profile.release]
opt-level      = "s"      # Balance size and speed for CLI
strip          = true     # Strip symbols
lto            = "thin"   # Thin LTO: ~90% benefit, ~20% time
codegen-units  = 1        # Single codegen unit

[dev-dependencies]
assert_cmd = "2"
filetime   = "0.2"
tempfile   = "3"
