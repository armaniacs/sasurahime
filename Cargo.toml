[package]
name = "sasurahime"
version = "0.1.2"
edition = "2021"

[[bin]]
name = "sasurahime"
path = "src/main.rs"

[dependencies]
clap        = { version = "4", features = ["derive"] }
anyhow      = "1"
walkdir     = "2"
indicatif   = "0.17"
dialoguer   = "0.11"
comfy-table = "7"
dirs        = "5"
toml        = "0.8"
serde       = { version = "1", features = ["derive"] }

[profile.release]
opt-level      = "z"    # Optimize for size
strip          = true   # Strip symbols
lto            = true   # Cross-crate LTO
codegen-units  = 1      # Single-codegen unit for more optimization opportunities

[dev-dependencies]
assert_cmd = "2"
filetime   = "0.2"
tempfile   = "3"
